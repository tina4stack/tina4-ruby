name: Tests

on:
  push:
    branches: [v3]
  pull_request:
    branches: [v3]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      - name: Run tests
        run: bundle exec rspec

      - name: Report results
        if: always()
        run: echo "Test run completed with exit code $?"
